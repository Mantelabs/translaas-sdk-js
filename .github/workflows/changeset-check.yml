name: Changeset Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-changesets:
    name: Check for Changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Setup npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Check for Changesets
        run: |
          # Check if there are any changes to package source code (not just package.json or examples)
          # Exclude examples directory and only check for actual source code changes
          PACKAGE_SOURCE_CHANGES=$(git diff --name-only origin/main...HEAD | grep "^packages/" | grep -E "\.(ts|tsx|js|jsx)$" | grep -v "^packages/.*/examples/" || true)

          if [ -n "$PACKAGE_SOURCE_CHANGES" ]; then
            # Check if there are any changeset files
            if ! git diff --name-only origin/main...HEAD | grep -q "^\.changeset/"; then
              echo "❌ No changeset found for package changes!"
              echo "Please create a changeset by running: npm run changeset"
              echo ""
              echo "Changed packages:"
              echo "$PACKAGE_SOURCE_CHANGES" | sed 's|packages/@translaas/||' | sed 's|/.*||' | sort -u
              exit 1
            else
              echo "✅ Changeset found!"
            fi
          else
            echo "ℹ️  No package source code changes detected, skipping changeset check"
            echo "Note: Changes to examples, tests, or package.json only don't require changesets"
          fi
