name: CI

# Default: Ubuntu only (push/PR) to limit Actions spend across many SDK repos.
# Windows + macOS: run manually — Actions → CI → Run workflow.
on:
  push:
    branches:
      - main
      - develop
    paths: &ci-paths
      - '.github/workflows/ci.yml'
      - 'packages/**'
      - 'scripts/**'
      - 'tests/**'
      - 'vitest.config*.ts'
      - 'eslint.config.*'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
      - develop
    paths: *ci-paths
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-prep:
    name: Prepare CI matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","node-version":"20.x"},{"os":"macos-latest","node-version":"20.x"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"os":"ubuntu-latest","node-version":"20.x"},{"os":"ubuntu-latest","node-version":"22.x"}]}' >> $GITHUB_OUTPUT
          fi

  build-and-test:
    name: Build and Test (${{ matrix.os }} - Node.js ${{ matrix.node-version }})
    needs: matrix-prep
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-prep.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Validate sibling dependency pins
        run: npm run validate:sibling-deps

      - name: Generate documentation
        run: npm run docs
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info,./coverage/coverage-final.json
          flags: unit
          name: unit-tests
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          flags: integration
          name: integration-tests
          fail_ci_if_error: false

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - unit-tests
      - integration-tests
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
