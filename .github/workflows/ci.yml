name: CI

# Default: Ubuntu only (push/PR) to limit Actions spend across many SDK repos.
# Windows + macOS: run manually — Actions → CI → Run workflow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-prep:
    name: Prepare CI matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","node-version":"20.x"},{"os":"macos-latest","node-version":"20.x"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"os":"ubuntu-latest","node-version":"20.x"},{"os":"ubuntu-latest","node-version":"22.x"}]}' >> $GITHUB_OUTPUT
          fi

  build-and-test:
    name: Build and Test (${{ matrix.os }} - Node.js ${{ matrix.node-version }})
    needs: matrix-prep
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-prep.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: false

      - name: Run type checking
        run: npm run type-check
        continue-on-error: false

      - name: Build
        run: npm run build
        continue-on-error: false

      - name: Generate documentation
        run: npm run docs
        continue-on-error: true

      - name: Run tests
        run: npm test -- --coverage
        continue-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            coverage/**
            test-results/**
          retention-days: 30

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
